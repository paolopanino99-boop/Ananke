<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La carta dei vini di Ananke</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght=0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #e44f24; /* Arancione Ananke */
            color: #111111;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .serif-ananke {
            font-family: 'Cormorant Garamond', serif;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- CONTENITORE DELLO SFONDO GEOMETRICO ANIMATO --- */
        .geo-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .geo-shape {
            position: absolute;
            opacity: 0.25;
            transform-origin: center;
        }

        /* 1. Il grande triangolo grigio chiaro */
        .shape-triangle {
            width: 0;
            height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-bottom: 300px solid #dcdcdc;
            top: 15%;
            left: -5%;
            animation: floatTriangle 25s ease-in-out infinite alternate;
        }

        /* 2. La linea sottile scura obliqua */
        .shape-line {
            width: 2px;
            height: 500px;
            background-color: #222222;
            top: -5%;
            right: 15%;
            transform: rotate(40deg);
            animation: shiftLine 30s ease-in-out infinite alternate;
        }

        /* 3. Il rettangolo rosa/salmone inclinato */
        .shape-bar-pink {
            width: 450px;
            height: 50px;
            background-color: #fca5a5;
            top: 35%;
            left: 10%;
            transform: rotate(-25deg);
            box-shadow: -5px 5px 0px rgba(234, 179, 8, 0.4);
            animation: floatBar 18s ease-in-out infinite alternate;
        }

        /* 4. Il cerchio azzurro chiaro */
        .shape-circle-blue {
            width: 90px;
            height: 90px;
            background-color: #bae6fd;
            border-radius: 50%;
            bottom: 25%;
            right: 8%;
            animation: floatCircle 14s ease-in-out infinite alternate;
        }

        /* 5. Il semicerchio / cupola grigia in basso a sinistra */
        .shape-dome {
            width: 220px;
            height: 110px;
            background-color: #b7b5b3;
            border-top-left-radius: 110px;
            border-top-right-radius: 110px;
            bottom: -20px;
            left: 8%;
            animation: swayDome 22s ease-in-out infinite alternate;
        }

        /* 6. La barretta blu orizzontale */
        .shape-bar-blue {
            width: 160px;
            height: 20px;
            background-color: #6366f1;
            bottom: 70px;
            left: 18%;
            animation: floatBarBlue 12s ease-in-out infinite alternate;
        }

        /* --- ANIMAZIONI CSS --- */
        @keyframes floatTriangle {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(30px, -20px) rotate(8deg) scale(1.05); }
            100% { transform: translate(-15px, 40px) rotate(-5deg) scale(0.95); }
        }
        @keyframes shiftLine {
            0% { transform: rotate(40deg) translate(0, 0); }
            100% { transform: rotate(45deg) translate(-40px, 20px); }
        }
        @keyframes floatBar {
            0% { transform: rotate(-25deg) translate(0, 0); }
            100% { transform: rotate(-21deg) translate(20px, -30px); }
        }
        @keyframes floatCircle {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-40px, -50px) scale(1.1); }
        }
        @keyframes swayDome {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(15px, 0) rotate(3deg); }
        }
        @keyframes floatBarBlue {
            0% { transform: translate(0, 0); }
            100% { transform: translate(10px, -15px); }
        }

        /* Blocco del contenuto sopra lo sfondo */
        .content-wrapper {
            position: relative;
            z-index: 10;
        }
        
        /* Forza la sezione filtri a stare sopra a tutto con isolamento visivo */
        .filter-section {
            position: relative;
            z-index: 30;
        }
    </style>
</head>
<body class="p-4 md:p-8 max-w-4xl mx-auto">

    <div class="geo-background">
        <div class="geo-shape shape-triangle"></div>
        <div class="geo-shape shape-line"></div>
        <div class="geo-shape shape-bar-pink"></div>
        <div class="geo-shape shape-circle-blue"></div>
        <div class="geo-shape shape-dome"></div>
        <div class="geo-shape shape-bar-blue"></div>
    </div>

    <div class="content-wrapper">
        <header class="text-center my-6 border-b border-black/10 pb-6">
            <h1 class="serif-ananke text-5xl md:text-6xl text-stone-950 tracking-tight font-medium lowercase">ananke</h1>
            <h2 class="serif-ananke text-2xl md:text-3xl text-stone-900 tracking-wide mt-1 italic">La carta dei vini</h2>
            <div id="status-loading" class="text-xs text-stone-900/60 mt-3 font-medium">Caricamento cantina in corso...</div>
        </header>

        <section class="filter-section mb-8 space-y-4">
            <input type="text" id="search-bar" oninput="renderWines()" placeholder="Cerca per nome, cantina, zona, regione..." class="w-full bg-[#f16943] placeholder-stone-950/60 p-3 rounded-xl border border-black/10 focus:outline-none focus:border-black/40 focus:bg-white text-stone-950 text-sm transition font-medium shadow-xs">
            
            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                <button onclick="filterType('Tutti', false)" class="cat-btn px-4 py-2 bg-stone-950 text-white rounded-full text-xs font-semibold uppercase tracking-wider whitespace-nowrap shadow-sm">Tutti</button>
                
                <button onclick="filterType('rosso', false)" class="cat-btn px-4 py-2 bg-[#f16943] text-stone-950 hover:bg-white/20 rounded-full text-xs font-bold uppercase tracking-wider whitespace-nowrap transition border border-black/5">Rossi</button>
                <button onclick="filterType('bianco', false)" class="cat-btn px-4 py-2 bg-[#f16943] text-stone-950 hover:bg-white/20 rounded-full text-xs font-bold uppercase tracking-wider whitespace-nowrap transition border border-black/5">Bianchi</button>
                <button onclick="filterType('bollicine', false)" class="cat-btn px-4 py-2 bg-[#f16943] text-stone-950 hover:bg-white/20 rounded-full text-xs font-bold uppercase tracking-wider whitespace-nowrap transition border border-black/5">Bollicine</button>
                
                <button onclick="filterType('rossi snelli', true)" class="cat-btn px-4 py-2 bg-[#f16943] text-stone-950 hover:bg-white/20 rounded-full text-xs font-semibold uppercase tracking-wider whitespace-nowrap transition border border-black/5">Rossi snelli</button>
                <button onclick="filterType('rossi muscolosi', true)" class="cat-btn px-4 py-2 bg-[#f16943] text-stone-950 hover:bg-white/20 rounded-full text-xs font-semibold uppercase tracking-wider whitespace-nowrap transition border border-black/5">Rossi muscolosi</button>
                <button onclick="filterType('bianchi salini', true)" class="cat-btn px-4 py-2 bg-[#f16943] text-stone-950 hover:bg-white/20 rounded-full text-xs font-semibold uppercase tracking-wider whitespace-nowrap transition border border-black/5">Bianchi salini</button>
                <button onclick="filterType('bianchi profumati', true)" class="cat-btn px-4 py-2 bg-[#f16943] text-stone-950 hover:bg-white/20 rounded-full text-xs font-semibold uppercase tracking-wider whitespace-nowrap transition border border-black/5">Bianchi profumati</button>
                <button onclick="filterType('champagne', true)" class="cat-btn px-4 py-2 bg-[#f16943] text-stone-950 hover:bg-white/20 rounded-full text-xs font-semibold uppercase tracking-wider whitespace-nowrap transition border border-black/5">Champagne</button>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 pt-1 border-t border-black/5">
                <div class="flex gap-2 flex-1">
                    <button onclick="filterPrice('ECONOMY')" id="btn-economy" class="price-btn flex-1 py-2.5 bg-[#f16943] text-stone-950 border border-black/10 rounded-xl text-xs font-bold tracking-widest transition active:scale-95 shadow-xs">
                        💰 ECONOMY <span class="block text-[9px] font-normal tracking-normal text-stone-950/60">Fino a 35€</span>
                    </button>
                    <button onclick="filterPrice('POWER')" id="btn-power" class="price-btn flex-1 py-2.5 bg-[#f16943] text-stone-950 border border-black/10 rounded-xl text-xs font-bold tracking-widest transition active:scale-95 shadow-xs">
                        ⚡ POWER <span class="block text-[9px] font-normal tracking-normal text-stone-950/60">Sopra i 35€</span>
                    </button>
                </div>
                <button onclick="suggestRandomWine()" class="w-full sm:w-auto px-6 py-2.5 bg-amber-500 hover:bg-amber-600 text-stone-950 rounded-xl text-xs font-black tracking-wider transition active:scale-95 shadow-sm uppercase cursor-pointer z-10">
                    MA CHE NE SO. FAI TU.
                </button>
            </div>
        </section>

        <main id="wine-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
            </main>
    </div>

    <div id="wine-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 items-center justify-center p-4" onclick="closeModal()">
        <div class="bg-stone-950 text-white p-6 md:p-8 rounded-3xl max-w-lg w-full border border-stone-800 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-stone-400 hover:text-white text-2xl font-sans">&times;</button>
            <div id="modal-badge-container" class="flex flex-wrap gap-1"></div>
            <h3 id="modal-wine-name" class="serif-ananke text-3xl text-amber-500 mt-3 font-medium leading-tight"></h3>
            <p id="modal-wine-cantina" class="text-stone-400 text-base mt-1 font-medium"></p>
            <div class="border-t border-stone-800 my-4 pt-4 space-y-2 text-sm text-stone-300">
                <p id="modal-wine-geo"></p>
                <p id="modal-wine-price" class="text-amber-500 font-bold text-lg pt-1"></p>
            </div>
            <div id="modal-desc-box" class="bg-stone-900/50 p-4 rounded-xl border border-stone-800/80 mt-4 hidden">
                <h4 class="text-xs uppercase tracking-wider text-amber-600 font-bold mb-2 font-sans">Nota di Degustazione</h4>
                <p id="modal-wine-desc" class="serif-ananke text-lg text-stone-200 leading-relaxed italic"></p>
            </div>
        </div>
    </div>

    <script>
        // Incolla l'URL del tuo foglio Google qui sotto alla riga successiva:
        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/17O5LVhc-iiQSwvMl7iWxgENIxnfaUJx1sJrTTyzRYTE/edit?hl=it&gid=0#gid=0";

        let wines = [];
        let currentFilter = 'Tutti';
        let isSubcategoryFilter = false; 
        let currentPriceFilter = 'Tutti'; 
        let isLoaded = false;

        function shuffleWines(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        window.googleDocCallback = function(data) {
            isLoaded = true;
            const statusEl = document.getElementById('status-loading');
            try {
                if (!data || !data.table || !data.table.rows) {
                    statusEl.innerText = "🔴 Il foglio Google risponde ma sembra vuoto.";
                    return;
                }
                const rows = data.table.rows;
                const cols = data.table.cols.map(c => c.label ? c.label.toLowerCase().trim() : '');
                
                if (!cols.includes('nome')) {
                    statusEl.innerHTML = "⚠️ <b>Errore Intestazioni:</b> Manca la colonna 'nome' nel foglio.";
                    return;
                }

                const validRows = rows.filter(row => row && row.c && row.c[cols.indexOf('nome')] && row.c[cols.indexOf('nome')].v);

                wines = shuffleWines(validRows.map(row => {
                    const obj = {};
                    row.c.forEach((cell, i) => { if (cols[i]) obj[cols[i]] = cell ? cell.v : ''; });
                    
                    const checkBool = (val) => val !== undefined && val !== null && String(val).toUpperCase() === 'TRUE';

                    return {
                        nome: obj.nome ? String(obj.nome).trim() : '',
                        cantina: obj.cantina ? String(obj.cantina).trim() : '',
                        regione: obj.regione ? String(obj.regione).trim() : '',
                        zona: obj.zona ? String(obj.zona).trim() : '',
                        anno: obj.anno ? parseInt(obj.anno) : '',
                        prezzo: obj.prezzo ? parseFloat(obj.prezzo) : 0,
                        disponibile: obj.disponibile !== undefined ? checkBool(obj.disponibile) : true,
                        doc: obj.doc ? String(obj.doc).trim() : '',
                        descrizione: obj.descrizione ? String(obj.descrizione).trim() : '',
                        tipo: obj.tipo ? String(obj.tipo).toLowerCase().trim() : '',

                        'rossi snelli': checkBool(obj['rossi snelli']),
                        'rossi muscolosi': checkBool(obj['rossi muscolosi']),
                        'bianchi salini': checkBool(obj['bianchi salini']),
                        'bianchi profumati': checkBool(obj['bianchi profumati']),
                        champagne: checkBool(obj.champagne)
                    };
                }));

                statusEl.innerText = "🟢 Cantina aggiornata";
                renderWines();
            } catch (error) {
                console.error(error);
                statusEl.innerText = "🔴 Errore durante l'elaborazione del menu.";
            }
        };

        function loadDataViaJSONP() {
            const statusEl = document.getElementById('status-loading');
            const matches = GOOGLE_SHEET_URL.match(/\/d\/([^/]+)/);
            if (!matches || !matches[1]) { statusEl.innerText = "🔴 Errore: Link del foglio non valido."; return; }
            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${matches[1]}/gviz/tq?tqx=responseHandler:googleDocCallback`;
            script.onerror = function() { statusEl.innerText = "🔴 Impossibile connettersi a Google Fogli."; };
            document.body.appendChild(script);
            setTimeout(() => { if (!isLoaded) statusEl.innerHTML = "⏳ Tempo scaduto. <button onclick='location.reload()' class='underline font-bold text-stone-950 ml-1'>Ricarica</button>"; }, 6000);
        }

        function filterType(type, isSub) {
            currentFilter = type;
            isSubcategoryFilter = isSub;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-4 py-2 bg-[#f16943] text-stone-950 hover:bg-white/20 rounded-full text-xs font-bold uppercase tracking-wider whitespace-nowrap transition border border-black/5";
            });
            event.target.className = "cat-btn px-4 py-2 bg-stone-950 text-white rounded-full text-xs font-semibold uppercase tracking-wider whitespace-nowrap shadow-sm";
            renderWines();
        }

        function filterPrice(mode) {
            const btnEconomy = document.getElementById('btn-economy');
            const btnPower = document.getElementById('btn-power');

            if (currentPriceFilter === mode) {
                currentPriceFilter = 'Tutti';
                btnEconomy.className = btnPower.className = "price-btn flex-1 py-2.5 bg-[#f16943] text-stone-950 border border-black/10 rounded-xl text-xs font-bold tracking-widest transition active:scale-95 shadow-xs";
            } else {
                currentPriceFilter = mode;
                btnEconomy.className = btnPower.className = "price-btn flex-1 py-2.5 bg-[#f16943] text-stone-950 border border-black/10 rounded-xl text-xs font-bold tracking-widest transition active:scale-95 shadow-xs";
                const activeBtn = mode === 'ECONOMY' ? btnEconomy : btnPower;
                activeBtn.className = "price-btn flex-1 py-2.5 bg-stone-950 text-white border-stone-950 rounded-xl text-xs font-bold tracking-widest transition active:scale-95 shadow-md";
            }
            renderWines();
        }

        function suggestRandomWine() {
            if (wines.length === 0) return;
            const eligibleWines = wines.filter(w => w.disponibile && w.prezzo <= 30);
            if (eligibleWines.length === 0) {
                alert("Nessun vino disponibile in cantina sotto i 30€ al momento.");
                return;
            }
            const randomIndex = Math.floor(Math.random() * eligibleWines.length);
            const selectedWine = eligibleWines[randomIndex];
            const globalIndex = wines.findIndex(w => w.nome === selectedWine.nome && w.cantina === selectedWine.cantina && w.anno === selectedWine.anno);
            if (globalIndex !== -1) { openModal(globalIndex); }
        }

        function openModal(index) {
            const w = wines[index];
            if (!w) return;
            const docBadge = w.doc ? `<span class="text-[10px] font-sans font-bold tracking-wider bg-stone-800 text-stone-400 px-1.5 py-0.5 rounded border border-stone-700 ml-2 uppercase">${w.doc}</span>` : '';
            
            let labels = [];
            if (w.tipo) labels.push(w.tipo);
            if (w['rossi snelli']) labels.push('Rossi snelli');
            if (w['rossi muscolosi']) labels.push('Rossi muscolosi');
            if (w['bianchi salini']) labels.push('Bianchi salini');
            if (w['bianchi profumati']) labels.push('Bianchi profumati');
            if (w.champagne) labels.push('Champagne');

            const badgesHtml = labels.map(l => `<span class="text-[9px] font-medium px-2 py-0.5 rounded-full uppercase tracking-wider bg-stone-900 text-stone-300 border border-stone-800">${l}</span>`).join('') + docBadge;

            document.getElementById('modal-badge-container').innerHTML = badgesHtml;
            document.getElementById('modal-wine-name').innerHTML = `${w.nome} <span class="text-lg font-sans text-stone-500 ml-1 font-normal">${w.anno || ''}</span>`;
            document.getElementById('modal-wine-cantina').innerText = w.cantina;
            document.getElementById('modal-wine-geo').innerHTML = `📍 Denominazione: <b>${w.zona || 'N/D'}</b> &bull; Regione: <b>${w.regione || 'N/D'}</b>`;
            document.getElementById('modal-wine-price').innerText = `${w.prezzo ? w.prezzo.toFixed(2) : '0.00'} €`;
            
            const descBox = document.getElementById('modal-desc-box');
            if (w.descrizione && w.descrizione.length > 0) {
                document.getElementById('modal-wine-desc').innerText = w.descrizione;
                descBox.classList.remove('hidden');
            } else {
                descBox.classList.add('hidden');
            }
            
            document.getElementById('wine-modal').classList.replace('hidden', 'flex');
        }

        function closeModal() { document.getElementById('wine-modal').classList.replace('flex', 'hidden'); }

        function renderWines() {
            const container = document.getElementById('wine-list');
            const searchQuery = document.getElementById('search-bar').value.toLowerCase();
            container.innerHTML = '';

            const filtered = wines.map((w, index) => ({...w, originalIndex: index})).filter(w => {
                let matchesFilter = false;
                if (currentFilter === 'Tutti') { matchesFilter = true; } 
                else if (isSubcategoryFilter) { matchesFilter = w[currentFilter] === true; } 
                else { matchesFilter = w.tipo === currentFilter.toLowerCase(); }
                
                const matchesSearch = w.nome.toLowerCase().includes(searchQuery) || w.cantina.toLowerCase().includes(searchQuery) || w.regione.toLowerCase().includes(searchQuery) || w.zona.toLowerCase().includes(searchQuery);
                
                let matchesPrice = true;
                if (currentPriceFilter === 'ECONOMY') matchesPrice = w.prezzo <= 35;
                if (currentPriceFilter === 'POWER') matchesPrice = w.prezzo > 35;

                return matchesFilter && matchesSearch && matchesPrice && w.disponibile;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-stone-900/60 py-12 italic text-sm">Nessun vino rispecchia i filtri selezionati.</p>`;
                return;
            }

            filtered.forEach(w => {
                let badgeLabel = w.tipo || 'Vino';
                let badgeColor = 'bg-stone-900 text-stone-200';
                
                if (w.champagne) { badgeLabel = 'Champagne'; badgeColor = 'bg-yellow-900/60 text-yellow-950 font-bold border border-yellow-900/20'; }
                else if (w['rossi muscolosi']) { badgeLabel = 'Rosso Muscoloso'; badgeColor = 'bg-red-950 text-red-100'; }
                else if (w['rossi snelli']) { badgeLabel = 'Rosso Snello'; badgeColor = 'bg-red-900/80 text-red-100'; }
                else if (w['bianchi profumati']) { badgeLabel = 'Bianco Profumato'; badgeColor = 'bg-amber-950 text-amber-100'; }
                else if (w['bianchi salini']) { badgeLabel = 'Bianco Salino'; badgeColor = 'bg-yellow-950 text-amber-100'; }
                else if (w.tipo === 'rosso') { badgeLabel = 'Rosso'; badgeColor = 'bg-red-950 text-red-200'; }
                else if (w.tipo === 'bianco') { badgeLabel = 'Bianco'; badgeColor = 'bg-amber-950 text-amber-100'; }
                else if (w.tipo === 'bollicine') { badgeLabel = 'Bollicine'; badgeColor = 'bg-stone-950 text-amber-200'; }

                const docBadge = w.doc ? `<span class="text-[10px] font-sans font-bold tracking-wider bg-black/10 text-stone-900 px-1.5 py-0.5 rounded border border-black/10 ml-2 uppercase">${w.doc}</span>` : '';
                const geoString = w.zona ? `${w.zona} &bull; ${w.regione}` : w.regione;
                const hasDesc = w.descrizione && w.descrizione.length > 0;

                container.innerHTML += `
                    <div onclick="openModal(${w.originalIndex})" class="bg-white/40 p-5 rounded-2xl border border-white/20 flex flex-col justify-between transition duration-200 backdrop-blur-xs cursor-pointer hover:bg-white/50 active:scale-[0.99]">
                        <div>
                            <div class="flex justify-between items-start gap-2">
                                <span class="text-[10px] font-semibold px-2.5 py-0.5 rounded-full uppercase tracking-wider ${badgeColor}">${badgeLabel}</span>
                                <span class="text-stone-950 font-bold font-sans">${w.prezzo ? w.prezzo.toFixed(2) : '0.00'} €</span>
                            </div>
                            <h3 class="serif-ananke text-2xl text-stone-950 mt-3 font-medium flex items-center flex-wrap leading-tight">
                                ${w.nome} 
                                <span class="text-base font-sans text-stone-900/60 ml-2 font-normal">${w.anno || ''}</span>
                                ${docBadge}
                            </h3>
                            <p class="text-stone-900/70 text-sm mt-0.5 font-medium">${w.cantina}</p>
                            <p class="text-stone-900/60 text-xs mt-2 flex items-center gap-1 font-medium">📍 ${geoString}</p>
                            ${hasDesc ? `<span class="text-[10px] font-semibold text-stone-900/50 mt-3 block font-sans">&#x24D8; Nota di degustazione disponibile</span>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        loadDataViaJSONP();
    </script>
</body>
</html>
